<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPPCOM Voicebot</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .widget {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.15);
            padding: 32px 28px;
            width: 320px;
            text-align: center;
            border: 1px solid #e8eaf0;
        }

        .logo { margin-bottom: 16px; }
        .logo img { height: 36px; }

        .title {
            font-size: 17px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 24px;
        }

        /* Mic button */
        .mic-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(59,130,246,0.4);
            position: relative;
        }
        .mic-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(59,130,246,0.5); }
        .mic-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .mic-btn.listening {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            box-shadow: 0 4px 16px rgba(239,68,68,0.5);
            animation: pulse 1.5s infinite;
        }
        .mic-btn.speaking {
            background: linear-gradient(135deg, #059669, #10b981);
            box-shadow: 0 4px 16px rgba(16,185,129,0.5);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 16px rgba(239,68,68,0.5); }
            50% { box-shadow: 0 4px 30px rgba(239,68,68,0.8), 0 0 0 10px rgba(239,68,68,0.1); }
        }

        .mic-icon { width: 36px; height: 36px; fill: white; }

        .mic-label {
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }

        /* Status area */
        .status-area {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 12px 16px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .status-text {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }
        .status-text.error { color: #dc2626; }
        .status-text.success { color: #059669; }

        /* Waveform animation */
        .waveform {
            display: none;
            gap: 3px;
            align-items: center;
            height: 32px;
        }
        .waveform.active { display: flex; }
        .waveform span {
            display: inline-block;
            width: 4px;
            border-radius: 2px;
            background: #3b82f6;
            animation: wave 1s infinite ease-in-out;
        }
        .waveform.speaking span { background: #10b981; }
        .waveform span:nth-child(1) { animation-delay: 0s; }
        .waveform span:nth-child(2) { animation-delay: 0.1s; }
        .waveform span:nth-child(3) { animation-delay: 0.2s; }
        .waveform span:nth-child(4) { animation-delay: 0.1s; }
        .waveform span:nth-child(5) { animation-delay: 0s; }
        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 28px; }
        }

        /* End button */
        .end-btn {
            background: none;
            border: 1px solid #e0e0e0;
            color: #888;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            display: none;
        }
        .end-btn:hover { border-color: #dc2626; color: #dc2626; }
        .end-btn.visible { display: inline-block; }

        .footer {
            margin-top: 16px;
            font-size: 11px;
            color: #bbb;
        }
        .footer a { color: #bbb; text-decoration: none; }

        #audioContainer { display: none; }
    </style>
</head>
<body>
    <div class="widget">
        <div class="logo">
            <img src="https://www.eppcom.de/assets/images/Logo.webp" alt="EPPCOM" onerror="this.style.display='none'">
        </div>
        <div class="title">Nexo – KI-Assistent</div>
        <div class="subtitle">Stell mir eine Frage zu EPPCOM Solutions</div>

        <div class="mic-wrapper">
            <button class="mic-btn" id="micBtn" onclick="toggleCall()">
                <svg class="mic-icon" viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                </svg>
            </button>
            <div class="waveform" id="waveform">
                <span style="height:12px"></span>
                <span style="height:20px"></span>
                <span style="height:28px"></span>
                <span style="height:20px"></span>
                <span style="height:12px"></span>
            </div>
            <div class="mic-label" id="micLabel">Klicken zum Starten</div>
        </div>

        <div class="status-area">
            <div class="status-text" id="statusText">Drücke den Knopf und sprich mit Nexo</div>
        </div>

        <button class="end-btn" id="endBtn" onclick="endCall()">Gespräch beenden</button>

        <div class="footer">
            Powered by <a href="https://www.eppcom.de" target="_blank">EPPCOM Solutions</a>
        </div>
    </div>

    <div id="audioContainer"></div>

    <script>
        const TOKEN_URL  = 'https://appdb.eppcom.de/api/lk-token';
        const ROOM_NAME  = 'eppcom-voice';

        const { Room, RoomEvent, Track } = LivekitClient;

        let room = null;
        let connected = false;

        function setStatus(msg, type = '') {
            const el = document.getElementById('statusText');
            el.textContent = msg;
            el.className = 'status-text' + (type ? ' ' + type : '');
        }

        function setMicState(state) {
            // state: idle | connecting | listening | speaking | ended
            const btn   = document.getElementById('micBtn');
            const label = document.getElementById('micLabel');
            const wave  = document.getElementById('waveform');
            const end   = document.getElementById('endBtn');

            btn.className   = 'mic-btn';
            wave.className  = 'waveform';

            if (state === 'idle') {
                label.textContent = 'Klicken zum Starten';
                end.className = 'end-btn';
            } else if (state === 'connecting') {
                btn.disabled = true;
                label.textContent = 'Verbinde…';
            } else if (state === 'listening') {
                btn.disabled = false;
                btn.classList.add('listening');
                wave.classList.add('active');
                label.textContent = 'Sprich jetzt…';
                end.classList.add('visible');
            } else if (state === 'speaking') {
                btn.disabled = false;
                btn.classList.add('speaking');
                wave.classList.add('active', 'speaking');
                label.textContent = 'Nexo antwortet…';
            } else if (state === 'ended') {
                btn.disabled = false;
                label.textContent = 'Klicken zum Starten';
                end.className = 'end-btn';
            }
        }

        async function toggleCall() {
            if (connected) {
                await endCall();
            } else {
                await startCall();
            }
        }

        async function startCall() {
            setMicState('connecting');
            setStatus('Verbindung wird aufgebaut…');

            try {
                // Token holen
                const resp = await fetch(`${TOKEN_URL}?room=${encodeURIComponent(ROOM_NAME)}&user=widget-visitor`);
                if (!resp.ok) throw new Error('Token-Server HTTP ' + resp.status);
                const data = await resp.json();

                // Room erstellen
                room = new Room({ adaptiveStream: false, dynacast: false });

                room.on(RoomEvent.Connected, () => {
                    connected = true;
                    setMicState('listening');
                    setStatus('Verbunden! Du kannst jetzt sprechen.', 'success');
                });

                room.on(RoomEvent.Disconnected, () => {
                    connected = false;
                    setMicState('ended');
                    setStatus('Gespräch beendet.');
                    room = null;
                    // Audio-Elemente entfernen
                    document.getElementById('audioContainer').innerHTML = '';
                });

                room.on(RoomEvent.TrackSubscribed, (track, _pub, participant) => {
                    if (track.kind === Track.Kind.Audio) {
                        const el = track.attach();
                        el.setAttribute('autoplay', '');
                        document.getElementById('audioContainer').appendChild(el);
                        setMicState('speaking');
                        setStatus('Nexo antwortet…');
                    }
                });

                room.on(RoomEvent.TrackUnsubscribed, (track) => {
                    track.detach().forEach(el => el.remove());
                    if (connected) {
                        setMicState('listening');
                        setStatus('Zuhören… sprich jetzt.', 'success');
                    }
                });

                room.on(RoomEvent.ParticipantConnected, (p) => {
                    if (p.identity && p.identity.startsWith('agent')) {
                        setStatus('Nexo ist jetzt bereit!', 'success');
                    }
                });

                await room.connect(data.url, data.token, { autoSubscribe: true });
                await room.localParticipant.setMicrophoneEnabled(true);

            } catch (e) {
                connected = false;
                setMicState('idle');
                setStatus('Fehler: ' + e.message, 'error');
                console.error(e);
            }
        }

        async function endCall() {
            if (room) {
                await room.disconnect();
            }
            connected = false;
            setMicState('idle');
            setStatus('Gespräch beendet. Klicke zum erneuten Starten.');
        }
    </script>
</body>
</html>
