<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPPCOM Voice Agent - Test</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.18.0/dist/livekit-client.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 30px; text-align: center; font-size: 28px; }
        .status {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
            min-height: 40px;
        }
        .status.connected { border-left-color: #10b981; background: #ecfdf5; }
        .status.error { border-left-color: #ef4444; background: #fef2f2; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #333; font-weight: 500; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: monospace;
        }
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-connect { background: #667eea; color: white; }
        .btn-connect:hover:not(:disabled) { background: #5568d3; }
        .btn-disconnect { background: #ef4444; color: white; }
        .btn-disconnect:hover:not(:disabled) { background: #dc2626; }
        .btn-mute { background: #e5e7eb; color: #333; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .logs {
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            max-height: 250px;
            overflow-y: auto;
            margin-top: 20px;
            line-height: 1.6;
        }
        .log-error { color: #ef4444; }
        .log-info { color: #60a5fa; }
        .log-success { color: #10b981; }
        #audioContainer audio { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>EPPCOM Voice Agent</h1>

        <div class="status" id="status">Bereit zum Verbinden</div>

        <div class="form-group">
            <label>LiveKit URL:</label>
            <input type="text" id="url" value="wss://appdb.eppcom.de:7443">
        </div>
        <div class="form-group">
            <label>Room:</label>
            <input type="text" id="roomName" value="voice-test-001">
        </div>
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="userName" value="Tester">
        </div>

        <div class="buttons">
            <button class="btn-connect" id="connectBtn" onclick="doConnect()">Verbinden</button>
            <button class="btn-mute" id="muteBtn" onclick="toggleMute()" disabled>Mikrofon An</button>
            <button class="btn-disconnect" id="disconnectBtn" onclick="doDisconnect()" disabled>Trennen</button>
        </div>

        <div id="audioContainer"></div>
        <div class="logs" id="logs"></div>
    </div>

<script>
const { Room, RoomEvent, Track, ConnectionState } = window.LivekitClient;
let room = null;

function log(msg, type = 'info') {
    const el = document.getElementById('logs');
    const d = document.createElement('div');
    d.className = 'log-' + type;
    d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
    console.log('[' + type + ']', msg);
}

function setStatus(text, type) {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status' + (type ? ' ' + type : '');
}

async function doConnect() {
    const url = document.getElementById('url').value;
    const roomName = document.getElementById('roomName').value;
    const userName = document.getElementById('userName').value;

    document.getElementById('connectBtn').disabled = true;
    setStatus('Verbinde...');

    try {
        // 1. Token holen
        log('Token wird generiert...');
        const tokenRes = await fetch('https://appdb.eppcom.de/api/lk-token?room=' +
            encodeURIComponent(roomName) + '&user=' + encodeURIComponent(userName));
        if (!tokenRes.ok) throw new Error('Token-Server HTTP ' + tokenRes.status);
        const tokenData = await tokenRes.json();
        const token = tokenData.token;
        log('Token erhalten', 'success');

        // 2. Room erstellen (OHNE audio:true - Mikrofon wird nach Connect aktiviert)
        room = new Room({
            adaptiveStream: false,
            dynacast: false,
        });

        // 3. Event Listener VOR connect() registrieren
        room.on(RoomEvent.Connected, () => {
            log('Verbunden mit Room: ' + room.name, 'success');
        });

        room.on(RoomEvent.Disconnected, () => {
            log('Getrennt', 'error');
            setStatus('Getrennt', 'error');
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
            document.getElementById('muteBtn').disabled = true;
            room = null;
        });

        room.on(RoomEvent.ParticipantConnected, (participant) => {
            log('Teilnehmer: ' + participant.identity, 'success');
        });

        room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
            log('Track empfangen: ' + track.kind + ' von ' + participant.identity, 'success');
            if (track.kind === Track.Kind.Audio) {
                const el = track.attach();
                document.getElementById('audioContainer').appendChild(el);
                log('Audio-Wiedergabe gestartet', 'success');
            }
        });

        room.on(RoomEvent.TrackUnsubscribed, (track) => {
            track.detach().forEach(el => el.remove());
            log('Track entfernt');
        });

        room.on(RoomEvent.ConnectionStateChanged, (state) => {
            log('Verbindungsstatus: ' + state);
        });

        room.on(RoomEvent.SignalConnected, () => {
            log('Signal-Verbindung hergestellt', 'success');
        });

        // 4. Verbinden
        log('Verbinde zu ' + url + ' ...');
        await room.connect(url, token, {
            autoSubscribe: true,
        });

        // 5. Mikrofon aktivieren NACH dem Connect
        log('Mikrofon wird aktiviert...');
        await room.localParticipant.setMicrophoneEnabled(true);
        log('Mikrofon aktiv - sprich jetzt!', 'success');

        setStatus('Verbunden als "' + userName + '" in "' + roomName + '"', 'connected');
        document.getElementById('disconnectBtn').disabled = false;
        document.getElementById('muteBtn').disabled = false;

    } catch (err) {
        log('Fehler: ' + err.message, 'error');
        setStatus('Fehler: ' + err.message, 'error');
        document.getElementById('connectBtn').disabled = false;
        if (room) { room.disconnect(); room = null; }
    }
}

function doDisconnect() {
    if (room) {
        room.disconnect();
        room = null;
    }
}

async function toggleMute() {
    if (!room) return;
    const enabled = room.localParticipant.isMicrophoneEnabled;
    await room.localParticipant.setMicrophoneEnabled(!enabled);
    document.getElementById('muteBtn').textContent = !enabled ? 'Mikrofon An' : 'Mikrofon Aus';
    log((!enabled ? 'Mikrofon aktiviert' : 'Mikrofon stummgeschaltet'));
}

// SDK Check on load
window.addEventListener('load', () => {
    if (window.LivekitClient && window.LivekitClient.Room) {
        log('LiveKit SDK v2.x geladen', 'success');
    } else {
        log('LiveKit SDK nicht geladen!', 'error');
    }
});
</script>
</body>
</html>
