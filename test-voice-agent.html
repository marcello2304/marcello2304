<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPPCOM Voice Agent - Test</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        .status {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
            min-height: 60px;
            overflow: auto;
        }
        .status.connected { border-left-color: #10b981; background: #ecfdf5; }
        .status.error { border-left-color: #ef4444; background: #fef2f2; }

        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: monospace;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 30px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
            grid-column: 1 / -1;
        }
        .btn-primary:hover:not(:disabled) { background: #5568d3; transform: translateY(-2px); }
        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }
        .btn-secondary:hover:not(:disabled) { background: #d1d5db; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .logs {
            background: #1f2937;
            color: #10b981;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 20px;
            line-height: 1.5;
        }
        .log-line { margin-bottom: 4px; }
        .log-error { color: #ef4444; }
        .log-info { color: #60a5fa; }
        .log-success { color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 EPPCOM Voice Agent Test</h1>

        <div class="status" id="status">
            Status: <span id="status-text">Bereit zum Verbinden</span>
        </div>

        <div class="form-group">
            <label for="url">LiveKit URL:</label>
            <input type="text" id="url" value="ws://46.224.54.65:7880" placeholder="ws://...">
        </div>

        <div class="form-group">
            <label for="token">Token:</label>
            <input type="text" id="token" placeholder="JWT Token (optional - auto-generated)">
        </div>

        <div class="form-group">
            <label for="roomName">Room Name:</label>
            <input type="text" id="roomName" value="test-voice-agent-001" placeholder="z.B. test-room-001">
        </div>

        <div class="form-group">
            <label for="userName">Your Name:</label>
            <input type="text" id="userName" value="Tester" placeholder="z.B. Dein Name">
        </div>

        <div class="buttons">
            <button class="btn-primary" id="connectBtn" onclick="connect()">🔗 Verbinden</button>
            <button class="btn-secondary" id="disconnectBtn" onclick="disconnect()" disabled>Trennen</button>
            <button class="btn-secondary" id="muteBtn" onclick="toggleMute()" disabled>🎤 Unmuted</button>
        </div>

        <div class="logs" id="logs"></div>
    </div>

    <script>
        let room = null;
        let localParticipant = null;

        const log = (msg, type = 'info') => {
            const logs = document.getElementById('logs');
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.appendChild(line);
            logs.scrollTop = logs.scrollHeight;
        };

        const updateStatus = (text, type = 'info') => {
            document.getElementById('status-text').textContent = text;
            document.getElementById('status').className = `status ${type === 'error' ? 'error' : type === 'connected' ? 'connected' : ''}`;
        };

        const connect = async () => {
            try {
                updateStatus('Verbinde...', 'info');
                document.getElementById('connectBtn').disabled = true;

                const url = document.getElementById('url').value;
                const roomName = document.getElementById('roomName').value;
                const userName = document.getElementById('userName').value;
                let token = document.getElementById('token').value;

                if (!token) {
                    // Auto-generate token from server
                    log('Generiere Token...', 'info');

                    // Determine token server URL based on LiveKit URL
                    let tokenServerUrl = 'http://localhost:8765';
                    if (url.includes('46.224.54.65')) {
                        tokenServerUrl = 'http://46.224.54.65:8765';
                    } else if (url.includes('eppcom.de')) {
                        tokenServerUrl = 'https://eppcom.de:8765';
                    }

                    try {
                        const tokenResponse = await fetch(`${tokenServerUrl}?room=${encodeURIComponent(roomName)}&user=${encodeURIComponent(userName)}`);
                        const tokenData = await tokenResponse.json();
                        token = tokenData.token;
                        document.getElementById('token').value = token;
                        log('✅ Token generiert', 'success');
                    } catch (tokenError) {
                        log(`⚠️ Token-Server nicht erreichbar: ${tokenError.message}`, 'error');
                        log('Versuche fallback auf localhost...', 'info');
                        const tokenResponse = await fetch(`http://localhost:8765?room=${encodeURIComponent(roomName)}&user=${encodeURIComponent(userName)}`);
                        const tokenData = await tokenResponse.json();
                        token = tokenData.token;
                        document.getElementById('token').value = token;
                        log('✅ Token generiert (fallback)', 'success');
                    }
                }

                log(`Verbinde zu: ${url}`);
                room = await window.LivekitClient.connect(url, token, {
                    audio: true,
                    video: false,
                    autoSubscribe: true,
                });

                localParticipant = room.localParticipant;

                // Event listeners
                room.on(window.LivekitClient.RoomEvent.ParticipantConnected, (participant) => {
                    log(`✅ Agent verbunden: ${participant.name}`, 'success');
                    participant.on(window.LivekitClient.ParticipantEvent.TrackSubscribed, (track) => {
                        if (track.kind === 'audio') {
                            const audio = document.createElement('audio');
                            audio.srcObject = new MediaStream([track.mediaStream.getAudioTracks()[0]]);
                            audio.play();
                            log('🔊 Audio-Stream gestartet', 'success');
                        }
                    });
                });

                room.on(window.LivekitClient.RoomEvent.Disconnected, () => {
                    log('❌ Vom Server getrennt', 'error');
                    updateStatus('Getrennt', 'error');
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('disconnectBtn').disabled = true;
                    document.getElementById('muteBtn').disabled = true;
                });

                updateStatus(`✅ Verbunden als "${userName}" in Room "${roomName}"`, 'connected');
                document.getElementById('disconnectBtn').disabled = false;
                document.getElementById('muteBtn').disabled = false;
                log(`✅ Mit ${url} verbunden`, 'success');
                log(`📍 Room: ${roomName}, Benutzer: ${userName}`, 'success');

            } catch (error) {
                log(`❌ Fehler: ${error.message}`, 'error');
                updateStatus(`Fehler: ${error.message}`, 'error');
                document.getElementById('connectBtn').disabled = false;
            }
        };

        const disconnect = () => {
            if (room) {
                room.disconnect();
                log('👋 Getrennt', 'info');
            }
        };

        const toggleMute = () => {
            if (localParticipant) {
                const isMuted = localParticipant.isMicrophoneEnabled;
                localParticipant.setMicrophoneEnabled(!isMuted);
                document.getElementById('muteBtn').textContent = isMuted ? '🔇 Muted' : '🎤 Unmuted';
                log(isMuted ? '🔇 Mikrofon stummgeschaltet' : '🎤 Mikrofon aktiviert', 'info');
            }
        };

    </script>
</body>
</html>
