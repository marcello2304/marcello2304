# docker-compose.yml für Server 2 (LLM + Voice)
# Server 2: Ollama + LiveKit

version: '3.8'

networks:
  ai-net:
    name: ai-net
    driver: bridge

volumes:
  ollama-data:
  livekit-data:

services:

  # ── Nginx (Reverse Proxy für Server 2) ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./nginx/certs:/etc/nginx/certs:ro  # Let's Encrypt via certbot
      - /var/www/certbot:/var/www/certbot:ro
    environment:
      - OLLAMA_BEARER_TOKEN=${OLLAMA_BEARER_TOKEN}
    # envsubst ersetzt ${OLLAMA_BEARER_TOKEN} im Template vor nginx-Start
    command: >
      sh -c "envsubst '$$OLLAMA_BEARER_TOKEN' < /etc/nginx/nginx.conf.template
             > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    networks:
      - ai-net
    depends_on:
      - ollama
      - livekit

  # ── Certbot (Let's Encrypt für Nginx) ─────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    # Einmalig: docker-compose run certbot certonly --webroot
    #           --webroot-path=/var/www/certbot
    #           -d ollama.deine-domain.de -d voice.deine-domain.de

  # ── Ollama (LLM Inference) ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    # GPU-Unterstützung (falls NVIDIA GPU vorhanden):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-net
    # KEIN externer Port — nur via Nginx/Proxy erreichbar
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: "5m"
      OLLAMA_NUM_PARALLEL: "2"
      # OLLAMA_GPU_MEMORY_FRACTION: "0.9"

  # ── LiveKit Server ────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    ports:
      - "7880:7880"     # HTTP/WS
      - "7881:7881"     # RTC TCP
      - "50000-50100:50000-50100/udp"  # RTC UDP (Range begrenzen!)
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7880/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── LiveKit Agent (EPPCOM Voice Bot) ──────────────────────────────────
  livekit-agent:
    build:
      context: ./voice-agent
      dockerfile: Dockerfile
    image: eppcom/voice-agent:latest
    container_name: livekit-agent
    restart: unless-stopped
    environment:
      LIVEKIT_URL: "ws://livekit:7880"
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      N8N_URL: ${N8N_URL:-https://workflows.eppcom.de}
      RAG_URL: ${RAG_URL:-https://appdb.eppcom.de}
      TENANT_ID: ${TENANT_ID:-}
      API_KEY: ${RAG_API_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      PIPER_MODEL: /opt/piper-models/de_DE-thorsten-medium.onnx
    networks:
      - ai-net
    depends_on:
      livekit:
        condition: service_healthy
      ollama:
        condition: service_healthy
