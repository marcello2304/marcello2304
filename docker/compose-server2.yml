# docker-compose.yml für Server 2 (LLM + Voice)
# Server 2: Ollama + LiveKit

networks:
  ai-net:
    name: ai-net
    driver: bridge

volumes:
  ollama-data:
  livekit-data:

services:

  # ── Nginx (Reverse Proxy für Server 2) ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro  # Let's Encrypt via certbot
      - /var/www/certbot:/var/www/certbot:ro
      - /root/marcello2304/test-voice-agent.html:/usr/share/nginx/html/test-voice-agent.html:ro  # Test HTML
    networks:
      - ai-net
    depends_on:
      - ollama
      - livekit
      - token-server

  # ── Token Server (JWT Generation für LiveKit WebSocket) ─────────────────
  token-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.token-server
    image: livekit-token-server:latest
    container_name: livekit-token-server
    restart: unless-stopped
    networks:
      - ai-net
    expose:
      - "8765"
    environment:
      PYTHONUNBUFFERED: "1"

  # ── Certbot (Let's Encrypt für Nginx) ─────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    # Einmalig: docker-compose run certbot certonly --webroot
    #           --webroot-path=/var/www/certbot
    #           -d ollama.deine-domain.de -d voice.deine-domain.de

  # ── Ollama (LLM Inference) ────────────────────────────────────────────
  # OPTIMIZATION: Using phi:2b instead of llama3.2:3b
  # - phi:2b: 2B params, ~40% faster, sufficient for Voice Bot responses
  # - llama3.2:3b: 3B params, better quality but too slow for real-time voice
  # Load model via: docker exec ollama ollama pull phi:2b
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    # GPU-Unterstützung (falls NVIDIA GPU vorhanden):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-net
    # KEIN externer Port — nur via Nginx/Proxy erreichbar
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: "5m"
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_NUM_THREADS: "4"  # Increased for better performance
      # OLLAMA_GPU_MEMORY_FRACTION: "0.9"

  # ── LiveKit Server ────────────────────────────────────────────────────
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    ports:
      - "7880:7880"     # HTTP/WS
      - "7881:7881"     # RTC TCP
      - "50000-50100:50000-50100/udp"  # RTC UDP (Range begrenzen!)
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7880/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── LiveKit Agent (Voice Bot Worker with Cartesia TTS) ──────────────
  livekit-agent:
    build:
      context: ../voice-agent
      dockerfile: Dockerfile
    image: livekit-agent:cartesia
    container_name: livekit-agent
    restart: unless-stopped
    env_file:
      - ../.env.server2
    environment:
      # LiveKit Connection
      LIVEKIT_URL: "ws://livekit:7880"
      # Rest loaded from env_file
      PYTHONUNBUFFERED: "1"

    networks:
      - ai-net
    depends_on:
      - livekit
      - ollama
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
