# docker-compose.yml für Server 1
# Verwendung mit Coolify: Services werden einzeln via Coolify UI deployed.
# Dieses File dient als Referenz / für manuelle Deployments ohne Coolify.
#
# ACHTUNG: Passwörter und Secrets MÜSSEN durch echte Werte ersetzt werden.
# Niemals Secrets in diesem File committen — nutze .env Datei.

version: '3.8'

networks:
  coolify:
    name: coolify
    driver: bridge
  rag-internal:
    name: rag-internal
    driver: bridge
    internal: true

volumes:
  postgres-data:
  n8n-data:
  traefik-certs:

services:

  # ── Traefik (Reverse Proxy + SSL) ────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=coolify"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/certs
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      # Dashboard (nur intern erreichbar)
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.middlewares=admin-ip"
      - "traefik.http.middlewares.admin-ip.ipallowlist.sourcerange=${ADMIN_IP}/32"

  # ── PostgreSQL + pgvector ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-rag
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: app_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro  # Automatische Migration bei erstem Start
    networks:
      - coolify
      - rag-internal
    # KEIN externer Port — nur intern erreichbar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
        -c shared_buffers=2GB
        -c effective_cache_size=6GB
        -c work_mem=128MB
        -c maintenance_work_mem=512MB
        -c max_connections=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c wal_buffers=64MB
        -c checkpoint_completion_target=0.9
        -c log_min_duration_statement=1000

  # ── n8n ──────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      # Core
      N8N_HOST: "n8n.${DOMAIN}"
      N8N_PROTOCOL: https
      N8N_PORT: "5678"
      WEBHOOK_URL: "https://n8n.${DOMAIN}/"
      N8N_EDITOR_BASE_URL: "https://n8n.${DOMAIN}/"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      # Database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres-rag
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: app_db
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      # Auth
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_ADMIN_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_ADMIN_PASSWORD}
      N8N_SECURE_COOKIE: "true"
      # Executions
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
      EXECUTIONS_DATA_PRUNE_MAX_COUNT: "10000"
      TZ: Europe/Berlin
      GENERIC_TIMEZONE: Europe/Berlin
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - coolify
      - rag-internal
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=letsencrypt"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "traefik.http.routers.n8n.middlewares=admin-ip"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── RAG Admin UI (appdb.eppcom.de) ──────────────────────────────────
  rag-admin:
    build:
      context: ../admin-ui
      dockerfile: Dockerfile
    image: eppcom/rag-admin:latest
    container_name: rag-admin
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres-rag:5432/app_db"
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      N8N_URL: "https://n8n.${DOMAIN}"
      OLLAMA_URL: ${OLLAMA_BASE_URL}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY muss in .env gesetzt sein}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-eppler@eppcom.de}
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text}
      EMBED_DIM: ${EMBED_DIM:-768}
      TZ: Europe/Berlin
    networks:
      - coolify
      - rag-internal
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rag-admin.rule=Host(`appdb.${DOMAIN}`)"
      - "traefik.http.routers.rag-admin.entrypoints=websecure"
      - "traefik.http.routers.rag-admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.rag-admin.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Typebot Builder ───────────────────────────────────────────────────
  typebot-builder:
    image: baptistearno/typebot-builder:latest
    container_name: typebot-builder
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: "https://builder.${DOMAIN}"
      NEXTAUTH_SECRET: ${TYPEBOT_SECRET}
      NEXT_PUBLIC_VIEWER_URL: "https://bot.${DOMAIN}"
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres-rag:5432/typebot_db"
      ENCRYPTION_SECRET: ${TYPEBOT_SECRET}
      # S3
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      # SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_AUTH_USER: ${SMTP_USER}
      SMTP_AUTH_PASS: ${SMTP_PASSWORD}
      NEXT_PUBLIC_SMTP_FROM: ${SMTP_FROM}
      DISABLE_SIGNUP: "true"
      TZ: Europe/Berlin
    networks:
      - coolify
      - rag-internal
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.typebot-builder.rule=Host(`builder.${DOMAIN}`)"
      - "traefik.http.routers.typebot-builder.entrypoints=websecure"
      - "traefik.http.routers.typebot-builder.tls.certresolver=letsencrypt"
      - "traefik.http.services.typebot-builder.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Typebot Viewer ────────────────────────────────────────────────────
  typebot-viewer:
    image: baptistearno/typebot-viewer:latest
    container_name: typebot-viewer
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: "https://builder.${DOMAIN}"
      NEXT_PUBLIC_VIEWER_URL: "https://bot.${DOMAIN}"
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres-rag:5432/typebot_db"
      ENCRYPTION_SECRET: ${TYPEBOT_SECRET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_ENDPOINT: ${S3_ENDPOINT}
      TZ: Europe/Berlin
    networks:
      - coolify
      - rag-internal
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.typebot-viewer.rule=Host(`bot.${DOMAIN}`)"
      - "traefik.http.routers.typebot-viewer.entrypoints=websecure"
      - "traefik.http.routers.typebot-viewer.tls.certresolver=letsencrypt"
      - "traefik.http.services.typebot-viewer.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
