# nginx.conf für Server 2 (Reverse Proxy für Ollama und LiveKit)
# Speichern als: /path/to/nginx/nginx.conf

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Security Headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ── HTTP → HTTPS Redirect ──────────────────────────────────────────
    server {
        listen 80;
        server_name ollama.DEINE_DOMAIN.de voice.DEINE_DOMAIN.de;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Ollama API (HTTPS, Bearer-Token gesichert) ─────────────────────
    server {
        listen 443 ssl;
        server_name ollama.DEINE_DOMAIN.de;

        ssl_certificate     /etc/nginx/certs/live/ollama.DEINE_DOMAIN.de/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/ollama.DEINE_DOMAIN.de/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Bearer Token Authentifizierung
        # OLLAMA_BEARER_TOKEN als Nginx-Variable setzen
        set $expected_token "Bearer DEIN_OLLAMA_API_TOKEN";

        location / {
            # Token prüfen
            if ($http_authorization != $expected_token) {
                return 401 '{"error":"Unauthorized"}';
            }

            proxy_pass         http://ollama:11434;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Streaming für Ollama
            proxy_buffering    off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 100M;
        }
    }

    # ── LiveKit WebSocket/HTTPS ────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name voice.DEINE_DOMAIN.de;

        ssl_certificate     /etc/nginx/certs/live/voice.DEINE_DOMAIN.de/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/voice.DEINE_DOMAIN.de/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass         http://livekit:7880;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }
    }
}
