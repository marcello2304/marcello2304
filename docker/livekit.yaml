# LiveKit Server Konfiguration
# Speichern als: /path/to/livekit/livekit.yaml

port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true  # Wichtig: Hetzner externe IP für ICE

# WICHTIG: Vor Deployment echte Keys generieren!
# openssl rand -base64 32 → als API Key
# openssl rand -base64 32 → als API Secret
keys:
  CHANGE_ME_API_KEY: CHANGE_ME_API_SECRET

logging:
  json: false
  level: info

room:
  auto_create: true
  max_participants: 50

turn:
  enabled: false  # Erst aktivieren wenn NAT-Probleme auftreten

webhook:
  urls:
    - https://n8n.DEINE_DOMAIN.de/webhook/livekit-events
  api_key: CHANGE_ME_API_KEY
