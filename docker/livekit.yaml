# LiveKit Server Konfiguration
# Speichern als: /path/to/livekit/livekit.yaml

port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true  # Wichtig: Hetzner externe IP für ICE

keys:
  LIVEKIT_API_KEY: LIVEKIT_API_SECRET_HIER  # Ersetzten durch echte Keys!

logging:
  json: false
  level: info

room:
  auto_create: true
  max_participants: 50

turn:
  enabled: false  # Erst aktivieren wenn NAT-Probleme auftreten

webhook:
  urls:
    - https://n8n.DEINE_DOMAIN.de/webhook/livekit-events
  api_key: LIVEKIT_API_KEY
