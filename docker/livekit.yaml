# LiveKit Server Konfiguration
# Speichern als: /path/to/livekit/livekit.yaml

port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  # Hetzner: use_external_ip schlägt fehl, stattdessen node_ip explizit setzen
  use_external_ip: false
  # WICHTIG: Beim Deployment die echte Server-2-IP eintragen!
  node_ip: 46.224.54.65

# WICHTIG: Muss mit .env LIVEKIT_API_KEY / LIVEKIT_API_SECRET synchron sein!
keys:
  8fa8f1b33782e91f85b57f6648712aeb: a161db1f4107b166ac82cf45d7799a73284a5a799c8d0b14dcbfc150c5bce21c

logging:
  json: false
  level: info

room:
  auto_create: true
  max_participants: 50

turn:
  enabled: false  # Erst aktivieren wenn NAT-Probleme auftreten

webhook:
  urls:
    - https://n8n.DEINE_DOMAIN.de/webhook/livekit-events
  api_key: 8fa8f1b33782e91f85b57f6648712aeb
