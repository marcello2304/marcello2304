<!--
  EPPCOM KI-Chatbot — Embed-Code für www.eppcom.de
  ==================================================
  Typebot v2 Bubble-Widget mit RAG-Backend.

  RAG-Pipeline:
    Typebot Widget → bot.eppcom.de → appdb.eppcom.de/api/public/chat → Ollama → Antwort

  Platzierung: Vor </body> auf jeder Seite.
-->

<!-- ═══════════════════════════════════════════════════════════════════
     TYPEBOT CHATBOT v2 (Bubble-Widget)
     Schwebendes Chat-Icon unten rechts — Typebot-Design.
     RAG-Antworten kommen server-seitig via Webhook.
     ═══════════════════════════════════════════════════════════════════ -->

<script type="module">
  import Typebot from "https://cdn.jsdelivr.net/npm/@typebot.io/js@0.3/dist/web.js";

  Typebot.initBubble({
    typebot: "eppcom-chatbot-v2",
    apiHost: "https://bot.eppcom.de",
    theme: {
      button: { backgroundColor: "#2563EB" },
      chatWindow: { backgroundColor: "#ffffff" },
    },
    previewMessage: {
      message: "Hallo! Kann ich Ihnen helfen?",
      autoShowDelay: 5000,
    },
  });
</script>
