<!--
  EPPCOM KI-Chatbot + Voice — Embed-Code für www.eppcom.de
  =========================================================
  Kombiniertes Chat-Widget mit Text- und Sprach-Modus.
  Öffnet automatisch beim Seitenaufruf.

  RAG-Pipeline (Text):
    Widget → appdb.eppcom.de/api/public/widget-chat → Ollama → Antwort

  Voice-Pipeline:
    Widget → LiveKit (voice.eppcom.de) → Whisper STT → RAG → Piper TTS → Antwort

  Platzierung: Vor </body> auf jeder Seite.

  Voraussetzung: Domain www.eppcom.de muss in der Admin UI
  unter "Domains" als Whitelist-Eintrag hinterlegt sein.
-->

<!-- ═══════════════════════════════════════════════════════════════════
     EPPCOM CHAT + VOICE WIDGET
     ═══════════════════════════════════════════════════════════════════ -->

<script src="https://appdb.eppcom.de/widget/chat-widget.js"
        data-api-url="https://appdb.eppcom.de/api/public/widget-chat"
        data-voice-token-url="https://appdb.eppcom.de/api/public/voice-token"
        data-livekit-url="wss://voice.eppcom.de"
        data-accent="#2563EB"
        data-welcome="Hallo! Willkommen bei EPPCOM Solutions — Ihrem Partner für KI-Automatisierung. Wie möchten Sie kommunizieren?"
        data-auto-open="true"
        defer></script>
