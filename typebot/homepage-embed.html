<!--
  EPPCOM KI-Chatbot — Embed-Code für www.eppcom.de
  ==================================================
  Bot: "EPPCOM Chatbot v2 (RAG)" auf bot.eppcom.de

  RAG-Pipeline:
    Typebot → n8n (workflows.eppcom.de/webhook/rag-query) → Ollama → Antwort

  Wähle eine der 3 Varianten und kopiere den Code in deine Website.
-->


<!-- ═══════════════════════════════════════════════════════════════════
     VARIANTE 1: BUBBLE (empfohlen für Homepage)
     Schwebendes Chat-Icon unten rechts, öffnet sich bei Klick.
     Platzierung: Vor </body> auf jeder Seite.
     ═══════════════════════════════════════════════════════════════════ -->

<script type="module">
  import Typebot from 'https://cdn.jsdelivr.net/npm/@typebot.io/js@0.3/dist/web.js';

  Typebot.initBubble({
    typebot: "eppcom-chatbot-v2",
    apiHost: "https://bot.eppcom.de",
    theme: {
      button: {
        backgroundColor: "#2563EB",
        iconColor: "#FFFFFF",
        size: "medium"
      },
      previewMessage: {
        message: "Hallo! Kann ich Ihnen helfen?",
        autoShowDelay: 5000
      },
      chatWindow: {
        backgroundColor: "#FFFFFF"
      }
    }
  });
</script>
